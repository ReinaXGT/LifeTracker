<style>
/* ── Plan card header ─────────────────────── */
.plan-card-header { display:flex; align-items:flex-start; gap:6px; justify-content:space-between; }
.plan-edit-btn { flex-shrink:0; opacity:0; transition:opacity .15s; width:1.625rem; height:1.625rem; padding:0; }
.kanban-card:hover .plan-edit-btn { opacity:1; }

/* ── Subtask progress bar ─────────────────── */
.plan-sub-progress-wrap { height:3px; background:var(--border); border-radius:2px; margin:0.625rem 0 0.25rem; overflow:hidden; }
.plan-sub-progress-bar { height:100%; background:var(--accent); border-radius:2px; transition:width .3s ease; }
.plan-sub-count { font-size:0.6875rem; color:var(--text-muted); font-family:var(--font-mono); margin-bottom:0.375rem; }

/* ── Subtask list (kanban card) ───────────── */
.plan-sub-list { display:flex; flex-direction:column; gap:0.25rem; margin-bottom:0.125rem; }
.plan-sub-item { display:flex; align-items:center; gap:0.4375rem; cursor:pointer; padding:0.125rem 0; }
.plan-sub-item { cursor:pointer; }
.plan-sub-label { font-size:0.75rem; color:var(--text-secondary); line-height:1.4; }
.plan-sub-item--done .plan-sub-label { text-decoration:line-through; color:var(--text-muted); }

/* ── Edit modal subtask rows ──────────────── */
.edit-sub-row { display:flex; align-items:center; gap:0.5rem; padding:0.375rem 0; border-bottom:1px solid var(--border); transition:background var(--transition-fast); }
.edit-sub-row:last-child { border-bottom:none; }
.edit-sub-row:hover { background:var(--bg-elevated); border-radius:0.375rem; }
.edit-sub-label { flex:1; font-size:0.8125rem; color:var(--text-secondary); line-height:1.4; }
.edit-sub-label--done { text-decoration:line-through; color:var(--text-muted); }

/* Drag handle */
.sub-drag-handle { display:flex; align-items:center; color:var(--text-muted); opacity:.25; cursor:grab; flex-shrink:0; transition:opacity var(--transition-fast); }
.edit-sub-row:hover .sub-drag-handle { opacity:.6; }
.edit-sub-row:hover .sub-drag-handle:hover { opacity:1; }
.edit-sub-row.sub-dragging { opacity:.35; background:var(--bg-elevated) !important; }
.edit-sub-row.sub-drag-over-top { box-shadow:inset 0 2px 0 var(--accent); }
.edit-sub-row.sub-drag-over-bot { box-shadow:inset 0 -2px 0 var(--accent); }

/* Edit & delete buttons */
.edit-sub-edit-btn, .edit-sub-del { opacity:0; transition:opacity var(--transition-fast); width:1.5rem; height:1.5rem; padding:0; flex-shrink:0; }
.edit-sub-row:hover .edit-sub-edit-btn,
.edit-sub-row:hover .edit-sub-del { opacity:1; }
</style>
