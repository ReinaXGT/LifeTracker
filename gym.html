<style>
/* ── Workout cards ─────────────────────────────────── */
.gym-card { padding:0.875rem 1.25rem; border-bottom:1px solid var(--border); transition:background var(--transition-fast); }
.gym-card:last-child { border-bottom:none; }
.gym-card:hover { background:var(--bg-elevated); }
.gym-card-header { display:flex; align-items:center; gap:0.625rem; margin-bottom:0.5rem; flex-wrap:wrap; }
.gym-type-badge { font-size:0.625rem; font-weight:700; padding:0.1875rem 0.5rem; border-radius:0.625rem; text-transform:uppercase; letter-spacing:.06em; white-space:nowrap; }
.gym-type-strength   { background:rgba(124,108,252,.15); color:var(--accent); }
.gym-type-cardio     { background:rgba(52,211,153,.15);  color:var(--green); }
.gym-type-flexibility{ background:rgba(96,165,250,.15);  color:var(--blue); }
.gym-type-crossfit   { background:rgba(251,191,36,.15);  color:#FBBF24; }
.gym-type-sport      { background:rgba(248,113,113,.15); color:var(--red); }
.gym-type-other      { background:rgba(148,163,184,.15); color:var(--text-muted); }
.gym-card-date { font-size:0.75rem; color:var(--text-muted); font-family:var(--font-mono); }
.gym-card-dur  { font-size:0.75rem; font-weight:600; color:var(--text-secondary); font-family:var(--font-mono); flex-shrink:0; }
.gym-card-notes { font-size:0.75rem; color:var(--text-muted); margin-bottom:0.5rem; font-style:italic; line-height:1.4; }
.gym-card-actions { display:flex; gap:0.25rem; opacity:0; transition:opacity var(--transition-fast); flex-shrink:0; margin-left:auto; }
.gym-card:hover .gym-card-actions { opacity:1; }
.gym-ex-chips { display:flex; flex-wrap:wrap; gap:0.3125rem; }
.gym-ex-chip { font-size:0.6875rem; padding:0.1875rem 0.5rem; border-radius:0.375rem; background:var(--bg-elevated); color:var(--text-secondary); font-family:var(--font-mono); border:1px solid var(--border); }
.gym-ex-chip-meta { color:var(--text-muted); }
.gym-card-rpe  { font-size:0.6875rem; font-weight:600; padding:0.125rem 0.4375rem; border-radius:0.5rem; background:rgba(251,146,60,.15); color:#FB923C; font-family:var(--font-mono); flex-shrink:0; }
.gym-card-dist { font-size:0.6875rem; color:var(--blue); font-family:var(--font-mono); flex-shrink:0; }
.gym-muscle-chip { font-size:0.625rem; padding:0.125rem 0.375rem; border-radius:0.375rem; background:rgba(124,108,252,.12); color:var(--accent); font-weight:600; text-transform:uppercase; letter-spacing:.04em; }

/* ── Exercise form rows ─────────────────────────────── */
.gym-ex-header { display:flex; gap:0.5rem; align-items:center; padding:0 0 0.375rem; border-bottom:1px solid var(--border); margin-bottom:0.25rem; }
.gym-ex-col-name { flex:1; font-size:0.625rem; font-weight:700; letter-spacing:.08em; text-transform:uppercase; color:var(--text-muted); }
.gym-ex-col-num  { width:4.375rem; font-size:0.625rem; font-weight:700; letter-spacing:.08em; text-transform:uppercase; color:var(--text-muted); text-align:center; }
.gym-ex-row  { display:flex; gap:0.5rem; align-items:flex-start; padding:0.375rem 0; border-bottom:1px solid var(--border); }
.gym-ex-row:last-child { border-bottom:none; }
.gym-ex-name-col { flex:1; min-width:0; display:flex; flex-direction:column; gap:0.25rem; }
.gym-ex-name  { width:100%; }
.gym-ex-small { width:4.375rem; text-align:center; flex-shrink:0; }
.gym-ex-metrics { display:flex; gap:0.5rem; flex-shrink:0; }

/* ── Progress panel ─────────────────────────────────── */
.gym-progress-header { display:flex; align-items:center; gap:0.75rem; padding:0.75rem 1.25rem; border-bottom:1px solid var(--border); }
.gym-progress-header label { font-size:0.75rem; font-weight:600; color:var(--text-muted); text-transform:uppercase; letter-spacing:.06em; white-space:nowrap; }
.gym-progress-header > div { flex:1; min-width:0; }

/* ── Off-day picker ─────────────────────────────────── */
.gym-off-days-bar { display:flex; gap:0.1875rem; background:var(--bg-base); border:1px solid var(--border); border-radius:0.4375rem; padding:0.1875rem; }
.gym-off-day-btn { flex:1; height:1.875rem; border-radius:0.3125rem; border:none; background:transparent; color:var(--text-muted); font-size:0.5625rem; font-weight:700; cursor:pointer; transition:background 150ms ease, color 150ms ease, transform 80ms ease; font-family:var(--font-mono); padding:0; text-transform:uppercase; letter-spacing:0; line-height:1; }
.gym-off-day-btn:hover:not(.active) { background:var(--bg-elevated); color:var(--text-secondary); }
.gym-off-day-btn:active { transform:scale(0.88); }
.gym-off-day-btn.active { background:rgba(248,113,113,.18); color:var(--red); font-weight:800; box-shadow:inset 0 0 0 1px rgba(248,113,113,.45); }

/* ── Body measurements ──────────────────────────────── */
.gym-body-recent { overflow-x:auto; }

/* ── Templates ──────────────────────────────────────── */
.gym-template-card { display:flex; align-items:flex-start; justify-content:space-between; padding:0.75rem 1.25rem; border-bottom:1px solid var(--border); transition:background var(--transition-fast); gap:0.75rem; }
.gym-template-card:last-child { border-bottom:none; }
.gym-template-card:hover { background:var(--bg-elevated); }
.gym-template-info { flex:1; min-width:0; }
.gym-template-name { font-weight:600; font-size:0.875rem; }
.gym-template-meta { font-size:0.75rem; color:var(--text-muted); margin-top:0.1875rem; }
.gym-template-ex-list { margin-top:0.375rem; display:flex; flex-direction:column; gap:0.125rem; }
.gym-template-ex-row { display:flex; align-items:center; gap:0.5rem; font-size:0.75rem; }
.gym-template-ex-name { color:var(--text-secondary); }
.gym-template-ex-detail { color:var(--text-muted); font-family:var(--font-mono); font-size:0.6875rem; }
.gym-template-actions { display:flex; gap:0.375rem; flex-shrink:0; align-items:flex-start; padding-top:0.125rem; }

/* ── Weekly goal progress ───────────────────────────── */
.gym-goal-bar { height:0.25rem; background:var(--border); border-radius:2px; margin-top:0.375rem; overflow:hidden; }
.gym-goal-fill { height:100%; background:var(--accent); border-radius:2px; transition:width .3s; }

/* ── kg / lb unit toggle ────────────────────────────── */
.gym-unit-toggle { position:relative; display:flex; align-items:center; height:34px; box-sizing:border-box; background:var(--bg-elevated); border:1px solid var(--border); border-radius:0.5rem; padding:0.1875rem; gap:0.125rem; }
.gym-unit-slider { position:absolute; top:0.1875rem; left:0.1875rem; height:calc(100% - 0.375rem); width:calc((100% - 0.5rem) / 2); background:var(--accent); border-radius:0.375rem; box-shadow:0 1px 6px rgba(124,108,252,.35); transition:transform 0.24s cubic-bezier(.22,1,.36,1); pointer-events:none; }
.gym-unit-slider.on-lb { transform:translateX(calc(100% + 0.125rem)); }
.gym-unit-btn { position:relative; z-index:1; border:none; border-radius:0.375rem; padding:0.25rem 0.875rem; font-size:0.8125rem; font-weight:700; font-family:var(--font-mono); cursor:pointer; color:var(--text-muted); background:transparent; transition:color .2s; letter-spacing:.04em; }
.gym-unit-btn.active { color:var(--accent-contrast, #fff); }
.gym-unit-btn:not(.active):hover { color:var(--text-primary); }

/* ── gym-csel-sm: compact variant for inline exercise rows ── */
.gym-csel-sm { height:1.75rem; padding:0 0.4375rem; gap:0.3125rem; font-size:0.6875rem; }

/* ── Drag-drop panel system ─────────────────────────── */
.gym-draggable-panel { transition:outline 150ms ease-out, opacity 150ms ease-out; }
.gym-panel-drag-enabled { outline:1.5px dashed var(--accent); outline-offset:3px; }
.gym-panel-drag-enabled .panel-header { cursor:grab; user-select:none; }
.gym-panel-drag-enabled .panel-header:active { cursor:grabbing; }
.gym-panel-dragging { opacity:0.3; }
.gym-draggable-panel.gym-panel-drag-over { outline:2px solid var(--accent); background:rgba(124,108,252,.08); }
.drag-handle-icon { width:0.9375rem; height:0.9375rem; color:var(--text-muted); flex-shrink:0; }
.gym-size-ctrl { display:flex; align-items:center; gap:0.125rem; margin-left:auto; padding-left:0.5rem; }
.gym-size-ctrl button { width:1.5rem; height:1.5rem; padding:0; display:flex; align-items:center; justify-content:center; }

/* ── Confirm modal ──────────────────────────────────── */
.gym-confirm-body { padding:1.25rem 1.5rem 0.5rem; font-size:0.875rem; color:var(--text-secondary); line-height:1.55; }

/* ── Custom select button (settings-lang style) ─────── */
.gym-csel {
  width:100%; display:flex; align-items:center; gap:0.5rem;
  padding:0 0.75rem; height:2.375rem;
  background:var(--bg-elevated); border:1px solid var(--border);
  border-radius:var(--radius-sm); cursor:pointer; text-align:left; overflow:hidden;
  transition:border-color var(--transition-fast), box-shadow var(--transition-fast);
  font-family:var(--font-body); font-size:0.875rem; color:var(--text-primary);
}
.gym-csel:hover { border-color:var(--accent); }
.gym-csel:focus { outline:none; border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-glow); }
.gym-csel-dot  { width:0.625rem; height:0.625rem; border-radius:50%; flex-shrink:0; }
.gym-csel-name { flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; text-align:left; }


</style>
</head>

        </div>

        <button class="btn btn-icon btn-secondary" id="gym-edit-btn" onclick="Gym.toggleEditMode()" data-tooltip="bud_edit_open" data-tooltip-i18n>

        </button>
        <button class="btn btn-secondary" onclick="Gym.triggerImport()" style="display:flex;align-items:center;gap:6px"><svg data-lucide="upload"></svg><span data-i18n="import_data_btn">Veri Aktar</span></button>
        <button class="btn btn-secondary" id="gym-add-body-btn">
